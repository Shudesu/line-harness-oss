name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build
      - name: Typecheck worker
        run: pnpm --filter worker typecheck
      - name: Typecheck web
        run: pnpm --filter web typecheck
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

  notify-failure:
    name: Notify CI Failure
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    # typecheck か build が失敗したときだけ発火（スキップは無視）
    if: |
      always() &&
      (needs.typecheck.result == 'failure' || needs.build.result == 'failure')
    steps:
      # 1. GitHub Issue 自動作成（built-in GITHUB_TOKEN で常時動作）
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const sha7   = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const failed = [];
            if ('${{ needs.typecheck.result }}' === 'failure') failed.push('❌ Type Check');
            if ('${{ needs.build.result }}'    === 'failure') failed.push('❌ Build Check');

            const body = [
              '## CI 失敗レポート',
              '',
              `| 項目 | 値 |`,
              `|------|-----|`,
              `| ブランチ | \`${branch}\` |`,
              `| コミット | \`${sha7}\` |`,
              `| 実行ログ | [Actions Run](${runUrl}) |`,
              '',
              '### 失敗ジョブ',
              ...failed,
              '',
              '### 対応手順',
              '1. 上記リンクで詳細ログを確認',
              '2. `pnpm install --frozen-lockfile && pnpm -r build` でローカル再現',
              '3. 修正後に push → CI 再実行',
              '4. このIssueをクローズ',
            ].join('\n');

            // 同一ブランチ・同一ワークフローの未クローズ Issue があれば重複作成しない
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'ci-failure',
              state: 'open',
            });
            const dup = existing.data.find(i =>
              i.title.includes(`[CI Failure]`) && i.title.includes(branch)
            );
            if (dup) {
              // 既存Issueにコメントを追加して更新
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: dup.number,
                body: `## 再発 (${sha7})\n\n失敗ジョブ: ${failed.join(', ')}\n\n[実行ログ](${runUrl})`,
              });
              console.log(`Updated existing issue #${dup.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  `[CI Failure] ${context.workflow} — ${branch}`,
                body,
                labels: ['ci-failure', 'bug'],
              });
              console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            }

      # 2. Telegram 通知（TELEGRAM_BOT_TOKEN シークレットが設定されている場合のみ）
      - name: Telegram notification
        if: env.BOT_TOKEN != ''
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHA7="${GITHUB_SHA:0:7}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🚨 CI 失敗: line-harness-oss
Branch: ${BRANCH}
Commit: ${SHA7}
Log: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null
