name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[vars]
WORKER_URL = "https://line-crm-worker.line-crm-api.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "943ecbca-3a59-4c6b-bcf1-011aabc85721"

[triggers]
crons = ["*/5 * * * *"]
