name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[vars]
WORKER_URL = "https://line-crm-worker.line-crm-api.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "f6958f40-8b53-4ec3-ba1b-08fc00fcb669"

[[queues.producers]]
queue = "mizukagami-processing"
binding = "MIZUKAGAMI_QUEUE"

[[queues.consumers]]
queue = "mizukagami-processing"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 5

[triggers]
crons = ["*/5 * * * *"]
